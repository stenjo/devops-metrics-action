","46","47","48"],"location":{"end":{"column":50,"line":142},"start":{"column":24,"line":142}}},{"id":"415","mutatorName":"ArithmeticOperator","replacement":"sum * ttr.length","statusReason":"expected 20 to be 5 // Object.is equality","status":"Killed","static":false,"testsCompleted":3,"killedBy":["45"],"coveredBy":["42","44","45","46","47","48"],"location":{"end":{"column":40,"line":142},"start":{"column":24,"line":142}}}],"source":"import {Issue} from './types/Issue'\nimport {Release} from './types/Release'\n\nexport interface BugTime {\n  start: number\n  end: number\n  repo: string\n}\n\nexport interface ReleaseDate {\n  published: number\n  url: string\n}\n\nconst ONE_DAY = 1000 * 60 * 60 * 24\n\nexport class MeanTimeToRestore {\n  today: Date\n  issues: Issue[]\n  releases: Release[]\n  releaseDates: ReleaseDate[] // array of object with unix time and repo url\n\n  constructor(issues: Issue[], releases: Release[], today: Date | null = null) {\n    if (today === null) {\n      this.today = new Date()\n    } else {\n      this.today = today\n    }\n    this.issues = issues\n    this.releases = releases\n    if (this.releases === null || this.releases.length === 0) {\n      throw new Error('Empty release list')\n    }\n    this.releaseDates = this.releases\n      .map(function (r) {\n        return {published: +new Date(r.published_at), url: r.url}\n      })\n      .sort((a, b) => a.published - b.published) // Sort ascending\n  }\n\n  getBugCount(): BugTime[] {\n    const bugs: Issue[] = this.getIssuesTaggedAsBug()\n    const values: BugTime[] = this.getStartAndEndTimesForBugs(bugs)\n\n    return values\n  }\n\n  private getStartAndEndTimesForBugs(bugs: Issue[]): BugTime[] {\n    const values: BugTime[] = []\n    for (const bug of bugs) {\n      const createdAt = +new Date(bug.created_at)\n      const closedAt = +new Date(bug.closed_at as string)\n      const repoName = bug.repository_url.split('/').reverse()[0]\n      if (\n        bug.closed_at != null &&\n        this.hasLaterRelease(closedAt, repoName) &&\n        this.hasPreviousRelease(createdAt, repoName)\n      ) {\n        values.push({\n          start: createdAt,\n          end: closedAt,\n          repo: repoName\n        })\n      }\n    }\n    return values\n  }\n\n  private getIssuesTaggedAsBug(): Issue[] {\n    const bugs: Issue[] = []\n    for (const issue of this.issues) {\n      const createdAt = +new Date(issue.created_at)\n      if (\n        issue.labels.filter(label => label.name === 'bug').length > 0 &&\n        createdAt > this.today.getTime() - 30 * ONE_DAY\n      ) {\n        bugs.push(issue)\n      }\n    }\n    return bugs\n  }\n\n  hasPreviousRelease(date: number, repo: string): boolean {\n    return (\n      this.releaseDates.filter(r => r.published <"+" date && r.url.includes(repo))\n        .length > 0\n    )\n  }\n\n  getReleaseBefore(date: number, repo: string): ReleaseDate {\n    const rdates: ReleaseDate[] = this.releaseDates.filter(\n      r => r.published <"+" date && r.url.includes(repo)\n    )\n\n    if (rdates.length === 0) {\n      throw new Error('No previous releases')\n    }\n\n    return rdates.pop() as ReleaseDate\n  }\n\n  getReleaseAfter(date: number, repo: string): ReleaseDate {\n    const rdates: ReleaseDate[] = this.releaseDates.filter(\n      r => r.published > date && r.url.includes(repo)\n    )\n\n    if (rdates.length === 0) {\n      throw new Error('No later releases')\n    }\n\n    return rdates.reverse().pop() as ReleaseDate\n  }\n\n  hasLaterRelease(date: number, repo: string): boolean {\n    return (\n      this.releaseDates.filter(r => r.published > date && r.url.includes(repo))\n        .length > 0\n    )\n  }\n\n  getRestoreTime(bug: BugTime): number {\n    const prevRel = this.getReleaseBefore(bug.start, bug.repo)\n    const nextRel = this.getReleaseAfter(bug.end, bug.repo)\n\n    return nextRel.published - prevRel.published\n  }\n\n  mttr(): number {\n    const ttr: number[] = this.getBugCount().map(bug => { torName":"BlockStatement","replacement":"{}","statusReason":"expected \"vi.fn()\" to be called with arguments: [ 'Failed to fetch releases' ]\u001b[90m\n\nNumber of calls: \u001b[1m0\u001b[22m\n\u001b[39m","status":"Killed","static":true,"testsCompleted":1,"killedBy":["58"],"coveredBy":["58","59","60","61"],"location":{"end":{"column":4,"line":91},"start":{"column":24,"line":89}}}],"source":"/* eslint-disable @typescript-eslint/no-explicit-any */\nimport * as core from '@actions/core'\nimport * as github from '@actions/github'\nimport {ReleaseAdapter} from './ReleaseAdapter'\nimport {DeployFrequency} from './DeployFrequency'\nimport {ChangeFailureRate} from './ChangeFailureRate'\nimport type {Issue} from './types/Issue'\nimport {IssuesAdapter} from './IssuesAdapter'\nimport {MeanTimeToRestore} from './MeanTimeToRestore'\nimport {PullRequestsAdapter} from './PullRequestsAdapter'\nimport {CommitsAdapter} from './CommitsAdapter'\nimport {LeadTime} from './LeadTime'\nimport type {Release} from './types/Release'\nimport type {PullRequest} from './types/PullRequest'\n\nexport async function run(): Promise<"+"void> {\n  try {\n    let repo: string = core.getInput('repo')\n    if (repo === '' || repo === null) {\n      repo = github.context.repo.repo\n      core.info(`${github.context.repo.repo} - default repo.`)\n    }\n\n    // Allow for multiple repos, ex: [val1, val2, val3]\n    const repositories = repo\n      .split(/[[\\]\\n,]+/)\n      .map(s => s.trim())\n      .filter(x => x !== '')\n\n    let owner: string = core.getInput('owner')\n    if (owner === '' || owner === null) {\n      owner = github.context.repo.owner\n      core.info(`${github.context.repo.owner} - default owner.`)\n    }\n\n    for (const repository of repositories) {\n      core.info(`${owner}/${repository}`)\n    }\n\n    const repoCount = repositories.length\n    if (repoCount > 1) {\n      core.info(`${repoCount.toString()} repositories registered.`)\n    } else {\n      core.info(`${repoCount.toString()} repository registered.`)\n    }\n\n    repo = repositories[0]\n\n    let token: string | undefined = core.getInput('token')\n    if (token === '' || token === null) {\n      // token = github.context.token;\n      token = process.env.GH_TOKEN\n    }\n\n    const logging: string | undefined = core.getInput('logging')\n    const filtered: boolean | undefined =\n      core.getInput('filtered') === 'true' ? true : false\n\n    const rel = new ReleaseAdapter(token, owner, repositories)\n    const releaseList = (await rel.GetAllReleasesLastMonth()) as Release[]\n    const df = new DeployFrequency(releaseList)\n    core.setOutput('deploy-rate', df.rate())\n    if (logging === 'true') {\n      core.setOutput('deploy-rate-log', df.getLog().join('\\n'))\n    }\n\n    const prs = new PullRequestsAdapter(token, owner, repositories)\n    const commits = new CommitsAdapter(token)\n    const pulls = (await prs.GetAllPRsLastMonth()) as PullRequest[]\n    const lt = new LeadTime(pulls, releaseList, commits)\n    const leadTime = await lt.getLeadTime(filtered)\n    core.setOutput('lead-time', leadTime)\n    if (logging === 'true') {\n      core.setOutput('lead-time-log', lt.getLog().join('\\n'))\n    }\n\n    const issueAdapter = new IssuesAdapter(token, owner, repositories)\n    const issueList: Issue[] | undefined =\n      await issueAdapter.GetAllIssuesLastMonth()\n    if (issueList) {\n      const cfr = new ChangeFailureRate(issueList, releaseList)\n      core.setOutput('change-failure-rate', cfr.Cfr())\n      const mttr = new MeanTimeToRestore(issueList, releaseList)\n      core.setOutput('mttr', mttr.mttr())\n    } else {\n      core.setOutput('change-failure-rate', 'empty issue list')\n      core.setOutput('mttr', 'empty issue list')\n    }\n  } catch (error: any) {\n    core.setFailed(error.message)\n  }\n}\n\nrun()\n"}},"schemaVersion":"1.0","thresholds":{"high":80,"low":60,"break":null},"testFiles":{"__tests__/LeadTime.test.ts":{"tests":[{"id":"0","name":"LeadTime should return 0 on no pull-requests"},{"id":"1","name":"LeadTime should return 0 on no closed pull-requests"},{"id":"2","name":"LeadTime should return 0 on no releases"},{"id":"3","name":"LeadTime should return 0 on no pull-requests with base.ref = main"},{"id":"4","name":"LeadTime should return 0 on 1 pullrequest with no commits"},{"id":"5","name":"LeadTime should return 8 on pull-requests with base.ref = main"},{"id":"6","name":"LeadTime should return 8 on pull-requests with base.ref = main and earlier release on other repo"},{"id":"7","name":"LeadTime should return 0 on too old pull-requests"},{"id":"8","name":"LeadTime should return 11 on pull-requests with two commits"},{"id":"9","name":"LeadTime should return 10.5 on pull-requests with two pulls on different repos"},{"id":"10","name":"LeadTime should return 8.5 on two pull-requests with two commits"},{"id":"11","name":"LeadTime should return 6,67 on three pull-requests with one commit each"},{"id":"12","name":"LeadTime should return 6 on three pull-requests with one commit each and two latest not released"},{"id":"13","name":"LeadTime should return 8 on three pull-requests with one commit each and two repos, latest not released"},{"id":"14","name":"LeadTime should get an empty log of releases or pulls"},{"id":"15","name":"LeadTime should get release log list weekly when rate calculated"},{"id":"16","name":"LeadTime should get event log list when lead time calculated"},{"id":"17","name":"LeadTime should get event log list when lead time calculated and filtered"},{"id":"18","name":"LeadTime should get event log list when lead time calculated and filtered with no fix or feat"}],"source":"import {CommitsAdapter} from '../src/CommitsAdapter'\nimport type {Commit} from '../src/types/Commit'\nimport type {PullRequest} from '../src/types/PullRequest'\nimport type {Release} from '../src/types/Release'\nimport {LeadTime} from '../src/LeadTime'\n\ndescribe('LeadTime should', () => {\n  const commitsAdapter: CommitsAdapter = new CommitsAdapter('')\n  commitsAdapter.getCommitsFromUrl = vi.fn(\n    async (): Promise<"+"Commit[] | undefined> => {\n      return Promise.resolve([{}] as Commit[])\n    }\n  )\n\n  it('return 0 on no pull-requests', async () => {\n    const pulls = [] as PullRequest[]\n    const lt = new LeadTime(\n      pulls,\n      [{published_at: '2023-04-30T17:50:53Z'}] as Release[],\n      commitsAdapter,\n      new Date()\n    )\n\n    const leadTime = await lt.getLeadTime()\n\n    expect(leadTime).toBe(0)\n  })\n\n  it('return 0 on no closed pull-requests', async () => {\n    const pulls = [\n      {\n        merged_at: ''\n      }\n    ] as PullRequest[]\n    const lt = new LeadTime(\n      pulls,\n      [{published_at: '2023-04-30T17:50:53Z'}] as Release[],\n      commitsAdapter,\n      new Date()\n    )\n\n    const leadTime = await lt.getLeadTime()\n\n    expect(leadTime).toBe(0)\n  })\n\n  it('return 0 on no releases', async () => {\n    const pulls = [\n      {\n        merged_at: '2023-04-28T17:50:53Z', // 30-22 = 8\n        base: {ref: 'main'}\n      }\n    ] as PullRequest[]\n\n    const lt = new LeadTime(pulls, [], commitsAdapter, new Date())\n\n    const leadTime = await lt.getLeadTime()\n\n    expect(leadTime).toBe(0)\n  })\n\n  it('return 0 on no pull-requests with base.ref = main', async () => {\n    const pulls = [\n      {\n        merged_at: '2023-04-29T17:50:53Z',\n        base: {\n          ref: 'other'\n        }\n      }\n    ] as PullRequest[]\n    const lt = new LeadTime(pulls, [], commitsAdapter, new Date())\n\n    const leadTime = await lt.getLeadTime()\n\n    expect(leadTime).toBe(0)\n  })\n\n  it('return 0 on 1 pullrequest with no commits', async () => {\n    const pulls = [] as PullRequest[]\n    const lt = new LeadTime(pulls, [], commitsAdapter, new Date())\n\n    const leadTime = await lt.getLeadTime()\n\n    expect(leadTime).toBe(0)\n  })\n\n  it('return 8 on pull-requests with base.ref = main', async () => {\n    const pullRequests (pulls, rels, commitsAdapter, new Date('2023-05-01'))\n    const leadTime = await lt.getLeadTime(true)\n\n    const log = lt.getLog()\n\n    expect(\n      log.filter(l => {\n        return l.includes('pull')\n      }).length\n    ).toBe(1)\n\n    expect(leadTime).toBe(10)\n  })\n\n  it('get event log list when lead time calculated and filtered with no fix or feat', async () => {\n    commitsAdapter.getCommitsFromUrl = vi.fn(\n      async (url: string): Promise<"+"Commit[] | undefined> => {\n        return Promise.resolve(getCommits(url))\n      }\n    )\n    // getCommits()\n    // Returning commits from (10)=>22/4, (15)=>27/4 and (47)=>19/4\n\n    const pulls = [\n      {\n        merged_at: '2023-04-27T17:50:53Z', // Has a commit 19/4, first release is 29/4 -> Lead time 10 days\n        commits_url: '47',\n        base: {ref: 'main', repo: {name: 'other-repo'}},\n        title: 'chore(docs): better description'\n      },\n      {\n        merged_at: '2023-04-27T17:50:53Z', //  Has a commit 22/4, first release is 28/4 -> Lead time 6 days\n        commits_url: '10',\n        base: {ref: 'main', repo: {name: 'devops-metrics-action'}},\n        title: 'chore: cleaned up'\n      },\n      {\n        merged_at: '2023-04-29T17:50:53Z', //  Has a commit 27/4, first release is 30/4 -> Lead time 3 days\n        commits_url: '15',\n        base: {ref: 'main', repo: {name: 'devops-metrics-action'}},\n        title: 'ci: removed error message'\n      }\n    ] as PullRequest[]\n\n    const rels = [\n      {\n        url: 'https://api.github.com/repos/stenjo/devops-metrics-action/releases/101411508',\n        name: 'v1.1.0',\n        published_at: '2023-04-28T17:50:53Z'\n      },\n      {\n        url: 'https://api.github.com/repos/stenjo/other-repo/releases/101411508',\n        name: 'v0.1.0',\n        published_at: '2023-04-29T17:50:53Z'\n      },\n      {\n        url: 'https://api.github.com/repos/stenjo/devops-metrics-action/releases/101411508',\n        name: 'v0.0.1',\n "},{"id":"26","name":"ChangeFailureRate should calculate 50% failures on 1 issues on 2 releases"},{"id":"27","name":"ChangeFailureRate should calculate 0% failures on 1 issues that is not a bug on 2 releases"},{"id":"28","name":"ChangeFailureRate should calculate 50% failures on 2 issues after latest release"},{"id":"29","name":"ChangeFailureRate should calculate 100% failures on 2 issues after no releases this month"},{"id":"30","name":"ChangeFailureRate should calculate 100% failures on 2 issues after latest release and one before"},{"id":"31","name":"ChangeFailureRate should calculate 33% failures on 3 issues after first release and none after second of 3 releases"},{"id":"32","name":"ChangeFailureRate should calculate 50% failures on 3 issues on two repos on two of 4 releases"},{"id":"33","name":"ChangeFailureRate should calculate 50% failures on 3 issues after first release no older than a month"}],"source":"import {Issue} from '../src/types/Issue'\nimport fs from 'fs'\nimport {ChangeFailureRate} from '../src/ChangeFailureRate'\nimport {Release} from '../src/types/Release'\n\ndescribe('ChangeFailureRate should', () => {\n  it('get number of bugs created', () => {\n    const issues: Issue[] = JSON.parse(\n      fs.readFileSync('./__tests__/test-data/issue-list.json', 'utf8')\n    )\n    const releases: Release[] = JSON.parse(\n      fs.readFileSync('./__tests__/test-data/releases.json', 'utf8')\n    )\n    const cfr = new ChangeFailureRate(\n      issues,\n      releases,\n      new Date('2023-04-23T16:50:53Z')\n    )\n\n    const bugs = cfr.getBugs()\n\n    expect(bugs.length).toBe(2)\n  })\n\n  it('get percentage rate', () => {\n    const bugs: Issue[] = JSON.parse(\n      fs.readFileSync('./__tests__/test-data/issue-list.json', 'utf8')\n    )\n    const releases: Release[] = JSON.parse(\n      fs.readFileSync('./__tests__/test-data/releases.json', 'utf8')\n    )\n    const cfr = new ChangeFailureRate(\n      bugs,\n      releases,\n      new Date('2023-04-23T16:50:53Z')\n    )\n\n    const cfrPercentage = cfr.Cfr()\n\n    expect(cfrPercentage).toBe(14)\n  })\n\n  it('calculate 0 failures on 0 releases', () => {\n    const bugs: Issue[] = JSON.parse(\n      fs.readFileSync('./__tests__/test-data/issue-list.json', 'utf8')\n    )\n    const releases: Release[] = []\n\n    const cfr = new ChangeFailureRate(\n      bugs,\n      releases,\n      new Date('2023-04-30T17:50:53Z')\n    )\n\n    const value = cfr.Cfr()\n\n    expect(value).toBe(0)\n  })\n\n  it('calculate 0 failures on 0 issues', () => {\n    const bugs: Issue[] = []\n    const releases: Release[] = JSON.parse(\n      fs.readFileSync('./__tests__/test-data/releases.json', 'utf8')\n    )\n\n    const cfr = new ChangeFailureRate(\n      bugs,\n      releases,\n      new Date('2023-04-30T17:50:53Z')\n    )\n\n    const value = cfr.Cfr()\n\n    expect(value).toBe(0)\n  })\n\n  it('calculate 100% failures on 1 issues on 1 release', () => {\n    const bugs = [\n      {\n        created_at: '2023-04-30T17:50:53Z',\n        labels: [{name: 'bug'}],\n        repository_url: 'https://api.github.com/repos/stenjo/dora'\n      }\n    ] as Issue[]\n\n    const releases = [\n      {\n        url: 'https://api.github.com/repos/stenjo/dora/releases/101411508',\n        published_at: '2023-04-30T16:50:53Z'\n      }\n    ] as Release[]\n\n    const cfr = new ChangeFailureRate(\n      bugs,\n      releases,\n      new Date('2023-04-30T17:50:53Z')\n    )\n\n    const value = cfr.Cfr()\n\n    expect(value).toBe(100)\n  })\n\n  it('calculate 0% failures on 1 issues on 1 release when more than a month ago', () => {\n    const bugs = [\n      {\n        created_at: '2023-04-30T17:50:53Z',\n        labels: [{name: 'bug'}],\n        repository_url: 'https://api.github.com/repos/stenjo/dora'\n      }\n    ] as Issue[]\n\n    const releases = [\n      {\n        url: 'https://api.github.com/repos/stenjo/dora/releases/101411508',\n        published_at: '2023-04-30T16:50:53Z'\n      }\n    ] as Release[]\n\n    const cfr = new ChangeFailureRate(bugs, releases)\n\n    const value = cfr.Cfr()\n\n    expect(value).toBe(0)\n  })\n\n  it('calculate 0% failures on 1 issues on release on other repo', () => {\n    const bugs = [\n      {\n        created_at: '2023-04-30T17:50:53Z',\n        labels: [{name: 'bug'}],\n        repository_url: 'https://api.github.com/repos/stenjo/dora'\n      }\n    ] as Issue[]\n\n    const releases = [\n      {\n        url: 'https://api.github.com/repos/stenjo/other-repo/releases/101411508',\n        published_at: '2023-04-30T16:50:53Z'\n      }\n    ] as Release[]\n\n    const cfr = new ChangeFailureRate(\n      bugs,\n      releases,\n      new Date('2023-04-30T17:50:53Z')\n    )\n\n    const value = cfr.Cfr()\n\n    expect(value).toBe(0)\n  })\n\n  it('calculate 50% failures on 1 issues on 2 releases', () => {\n    const bugs = [\n      {\n        created_at: '2023-04-30T17:50:53Z',\n        repository_url: 'somepath/repository',\n        labels: [{name: 'bug'}]\n      }\n    ] as Issue[]\n\n    const releases = [\n      {\n        published_at: '2023-04-30T16:50:53Z',\n        url: 'path/with/repository/in/it'\n      },\n      {\n        published_at: '2023-04-29T16:50:53Z',\n        url: 'path/with/repository/in/it'\n      }\n    ] as Release[]\n\n    const cfr = new ChangeFailureRate(\n      bugs,\n      releases,\n      new Date('2023-04-30T17:50:53Z')\n    )\n\n    const value = cfr.Cfr()\n\n    expect(value).toBe(50)\n  })\n\n  it('calculate 0% failures on 1 issues that is not a bug on 2 releases', () => {\n    const bugs = [\n      {\n        created_at: '2023-04-30T17:50:53Z',\n        repository_url: 'somepath/repository',\n        labels: [{name: 'feature'}]\n      }\n    ] as Issue[]\n\n    const releases = [\n      {\n        published_at: '2023-04-30T16:50:53Z',\n        url: 'path/with/repository/in/it'\n      },\n      {\n        published_at: '2023-04-29T16:50:53Z',\n        url: 'path/with/repository/in/it'\n      }\n    ] as Release[]\n\n    const cfr = new ChangeFailureRate(\n      bugs,\n      releases,\n      new Date('2023-04-30T17:50:53Z')\n    )\n\n    const value = cfr.Cfr()\n\n    expect(value).toBe(0)\n  })\n\n  it('calculate 50% failures on 2 issues after latest release', () => {\n    const bugs = [\n      {\n        created_at: '2023-04-30T17:50:53Z',\n        repository_url: 'somepath/repository',\n        labels: [{name: 'bug'}]\n      },\n      {\n        created_at: '2023-04-30T17:50:53Z',\n        repository_url: 'somepath/repository',\n        labels: [{name: 'bug'}]\n      }\n    ] as Issue[]\n\n    const releases = [\n      {\n        published_at: '2023-04-30T16:50:53Z',\n        url: 'path/with/repository/in/it'\n      },\n      {\n        published_at: '2023-04-29T16:50:53Z',\n        url: 'path/with/repository/in/it'\n      }\n    ] as Release[]\n\n    const cfr = new ChangeFailureRate(\n      bugs,\n      releases,\n      new Date('2023-04-30T17:50:53Z')\n    )\n\n    const value = cfr.Cfr()\n\n    expect(value).toBe(50)\n  })\n\n  it('calculate 100% failures on 2 issues after no releases this month', () => {\n    const bugs = [\n      {\n        created_at: '2023-04-29T17:50:53Z',\n        repository_url: 'somepath/repository',\n        labels: [{name: 'bug'}]\n      },\n      {\n        created_at: '2023-04-31T17:50:53Z',\n        repository_url: 'somepath/repository',\n        labels: [{name: 'bug'}]\n      }\n    ] as Issue[]\n\n    const releases = [\n      {\n        published_at: '2023-04-30T16:50:53Z',\n        url: 'path/with/repository/in/it'\n      },\n      {\n        published_at: '2023-04-29T16:50:53Z',\n        url: 'path/with/repository/in/it'\n      }\n    ] as Release[]\n\n    const cfr = new ChangeFailureRate(\n      bugs,\n      releases,\n      new Date('2023-05-30T17:50:53Z')\n    )\n\n    const value = cfr.Cfr()\n\n    expect(value).toBe(100)\n  })\n\n  it('calculate 100% failures on 2 issues after latest release and one before', () => {\n    const bugs = [\n      {\n        created_at: '2023-04-29T17:50:53Z',\n        repository_url: 'somepath/repository',\n        labels: [{name: 'bug'}]\n      },\n      {\n        created_at: '2023-04-30T17:50:53Z',\n        repository_url: 'somepath/repository',\n        labels: [{name: 'bug'}]\n      },\n      {\n        created_at: '2023-04-30T17:50:53Z',\n        repository_url: 'somepath/repository',\n        labels: [{name: 'bug'}]\n      }\n    ] as Issue[]\n\n    const releases = [\n      {\n        published_at: '2023-04-30T16:50:53Z',\n        url: 'path/with/repository/in/it'\n      },\n      {\n        published_at: '2023-04-29T16:50:53Z',\n        url: 'path/with/repository/in/it'\n      }\n    ] as Release[]\n\n    const cfr = new ChangeFailureRate(\n      bugs,\n      releases,\n      new Date('2023-04-30T17:50:53Z')\n    )\n\n    const value = cfr.Cfr()\n\n    expect(value).toBe(100)\n  })\n\n  it('calculate 33% failures on 3 issues after first release and none after second of 3 releases', () => {\n    const bugs = [\n      {\n        created_at: '2023-04-29T17:50:53Z',\n        repository_url: 'somepath/repository',\n        labels: [{name: 'bug'}]\n      },\n      {\n        created_at: '2023-04-30T17:50:53Z',\n        repository_url: 'somepath/repository',\n        labels: [{name: 'bug'}]\n      },\n      {\n        created_at: '2023-04-30T17:50:53Z',\n        repository_url: 'somepath/repository',\n        labels: [{name: 'bug'}]\n      }\n    ] as Issue[]\n\n    const releases = [\n      {\n        published_at: '2023-04-28T16:50:53Z',\n        url: 'path/with/repository/in/it'\n      },\n      {\n        published_at: '2023-04-30T19:50:53Z',\n        url: 'path/with/repository/in/it'\n      },\n      {\n        published_at: '2023-05-02T16:50:53Z',\n        url: 'path/with/repository/in/it'\n      }\n    ] as Release[]\n\n    const cfr = new ChangeFailureRate(\n      bugs,\n      releases,\n      new Date('2023-04-30T17:50:53Z')\n    )\n\n    const value = cfr.Cfr()\n\n    expect(value).toBe(33)\n  })\n\n  it('calculate 50% failures on 3 issues on two repos on two of 4 releases', () => {\n    const bugs = [\n      {\n        created_at: '2023-04-29T17:50:53Z', // bug on 28, repository\n        repository_url: 'somepath/repository',\n        labels: [{name: 'bug'}]\n      },\n      {\n        created_at: '2023-04-30T17:50:53Z', // bug on 20, other-repo\n        repository_url: 'somepath/other-repo',\n        labels: [{name: 'bug'}]\n      },\n      {\n        created_at: '2023-04-30T17:50:53Z', // bug on 28, repository\n        repository_url: 'somepath/repository',\n        labels: [{name: 'bug'}]\n      }\n    ] as Issue[]\n\n    const releases = [\n      {\n        published_at: '2023-04-28T16:50:53Z',\n        url: 'path/with/repository/in/it'\n      },\n      {\n        published_at: '2023-04-28T16:50:53Z',\n        url: 'path/with/other-repo/in/it'\n      },\n      {\n        published_at: '2023-04-30T19:50:53Z',\n        url: 'path/with/repository/in/it'\n      },\n      {\n        published_at: '2023-05-02T16:50:53Z',\n        url: 'path/with/repository/in/it'\n      }\n    ] as Release[]\n\n    const cfr = new ChangeFailureRate(\n      bugs,\n      releases,\n      new Date('2023-04-30T17:50:53Z')\n    )\n\n    const value = cfr.Cfr()\n\n    expect(value).toBe(50)\n  })\n\n  it('calculate 50% failures on 3 issues after first release no older than a month', () => {\n    const bugs = [\n      {\n        created_at: '2023-04-29T17:50:53Z',\n        repository_url: 'somepath/repository',\n        labels: [{name: 'bug'}]\n      },\n      {\n        created_at: '2023-04-30T17:50:53Z',\n        repository_url: 'somepath/repository',\n        labels: [{name: 'bug'}]\n      },\n      {\n        created_at: '2023-04-30T17:50:53Z',\n        repository_url: 'somepath/repository',\n        labels: [{name: 'bug'}]\n      }\n    ] as Issue[]\n\n    const releases = [\n      {\n        published_at: '2023-04-28T16:50:53Z',\n        url: 'path/with/repository/in/it'\n      },\n      {\n        published_at: '2023-04-30T19:50:53Z',\n        url: 'path/with/repository/in/it'\n      },\n      {\n        published_at: '2023-04-02T16:50:53Z',\n        url: 'path/with/repository/in/it'\n      }\n    ] as Release[]\n\n    const cfr = new ChangeFailureRate(\n      bugs,\n      releases,\n      new Date('2023-05-29T10:50:53Z')\n    )\n\n    const value = cfr.Cfr()\n\n    expect(value).toBe(50)\n  })\n})\n"},"__tests__/MeanTimeToRestore.test.ts":{"tests":[{"id":"34","name":"MeanTimeToRestore should get bugs last month"},{"id":"35","name":"MeanTimeToRestore should find release time before date"},{"id":"36","name":"MeanTimeToRestore should throw error when no earlier dates"},{"id":"37","name":"MeanTimeToRestore should find release time after date"},{"id":"38","name":"MeanTimeToRestore should throw error when no later dates"},{"id":"39","name":"MeanTimeToRestore should check if there are later releases"},{"id":"40","name":"MeanTimeToRestore should get time for a bug 1"},{"id":"41","name":"MeanTimeToRestore should get time for a bug 2"},{"id":"42","name":"MeanTimeToRestore should get mttr for bug 1 when no release after bug 2"},{"id":"43","name":"MeanTimeToRestore should throw error when empty release list"},{"id":"44","name":"MeanTimeToRestore should get mttr for bug 1 when release in wrong repo after bug 2"},{"id":"45","name":"MeanTimeToRestore should get mttr for 2 bugs when release after bug 2"},{"id":"46","name":"MeanTimeToRestore should get mttr for 2 bugs on two repos when release after bug 2"},{"id":"47","name":"MeanTimeToRestore should get mttr for 2 bugs on two repos when no release after bug 1"},{"id":"48","name":"MeanTimeToRestore should get average time to repair"},{"id":"49","name":"MeanTimeToRestore should throw excepiton when no releases"},{"id":"50","name":"MeanTimeToRestore should return 0 when no bugs"}],"source":"import type {Issue} from '../src/types/Issue'\nimport type {Release} from '../src/types/Release'\nimport fs from 'node:fs'\nimport {\n  type BugTime,\n  type ReleaseDate,\n  MeanTimeToRestore\n} from '../src/MeanTimeToRestore'\n\ndescribe('MeanTimeToRestore should', () => {\n  const issues: Issue[] = JSON.parse(\n    fs.readFileSync('./__tests__/test-data/issue-list.json').toString()\n  )\n  const releases: Release[] = JSON.parse(\n    fs.readFileSync('./__tests__/test-data/releases.json').toString()\n  )\n  const mttr = new MeanTimeToRestore(\n    issues,\n    releases,\n    new Date('2023-04-30T16:50:53Z')\n  )\n\n  it('get bugs last month', () => {\n    const bugCount = mttr.getBugCount()\n\n    expect(bugCount.length).toBe(2)\n    expect(bugCount[0].start).toBe(+new Date('2023-04-25T21:21:49Z'))\n    expect(bugCount[1].end).toBe(+new Date('2023-04-23T16:47:40Z'))\n  })\n\n  it('find release time before date', () => {\n    const before1: ReleaseDate = mttr.getReleaseBefore(\n      +new Date('2023-04-25T21:21:49Z'),\n      'devops-metrics-action'\n    )\n    const before2: ReleaseDate = mttr.getReleaseBefore(\n      +new Date('2023-04-29T12:54:45Z'),\n      'devops-metrics-action'\n    )\n\n    expect(before1.published).toBe(+new Date('2023-04-22T20:28:29Z'))\n    expect(before2.published).toBe(+new Date('2023-04-29T06:18:36Z'))\n  })\n\n  it('throw error when no earlier dates', () => {\n    const t = (): void => {\n      mttr.getReleaseBefore(\n        +new Date('2023-04-05T21:21:49Z'),\n        'devops-metrics-action'\n      )\n    }\n\n    expect(t).toThrow('No previous releases')\n  })\n\n  it('find release time after date', () => {\n    const after1: ReleaseDate = mttr.getReleaseAfter(\n      +new Date('2023-04-25T21:21:49Z'),\n      'devops-metrics-action'\n    )\n    const after2: ReleaseDate = mttr.getReleaseAfter(\n      +new Date('2023-04-29T12:54:45Z'),\n      'devops-metrics-action'\n    )\n\n    expect(after1.published).toBe(+new Date('2023-04-29T06:18:36Z'))\n    expect(after2.published).toBe(+new Date('2023-04-30T16:06:06Z'))\n  })\n\n  it('throw error when no later dates', () => {\n    const t = (): void => {\n      mttr.getReleaseAfter(\n        +new Date('2023-05-05T21:21:49Z'),\n        'devops-metrics-action'\n      )\n    }\n\n    expect(t).toThrow('No later releases')\n  })\n\n  it('check if there are later releases', () => {\n    const hasLaterRelease: boolean = mttr.hasLaterRelease(\n      +new Date('2023-04-29T12:54:45Z'),\n      'devops-metrics-action'\n    )\n    const hasNoLaterRelease: boolean = mttr.hasLaterRelease(\n      +new Date('2023-04-30T17:29:44Z'),\n      'devops-metrics-action'\n    )\n\n    expect(hasLaterRelease).toBe(true)\n    expect(hasNoLaterRelease).toBe(false)\n  })\n\n  it('get time for a bug 1', () => {\n    const bug: BugTime = {\n      start: +new Date('2023-04-22T21:44:06Z'),\n      end: +new Date('2023-04-23T16:47:40Z'),\n      repo: 'devops-metrics-action'\n    }\n    const releaseDiff =\n      +new Date('2023-04-29T06:18:36Z') - +new Date('2023-04-22T20:28:29Z')\n\n    const fixTime: number = mttr.getRestoreTime(bug)\n\n    expect(fixTime).toBe(releaseDiff)\n    // console.log(fixTime/(1000*60*60*24))\n  })\n  it('get time for a bug 2', () => {\n    const bug: BugTime = {\n      start: +new Date('2023-04-25T21:21:49Z'),\n      end: +new Date('2023-04-29T12:54:45Z'),\n      repo: 'devops-metrics-action'\n    }\n    const releaseDiff =\n      +new Date('2023-04-30T16:06:06Z') - +new Date('2023-04-22T20:28:29Z')\n\n    const fixTime: number = mttr.getRestoreTime(bug)\n\n    expect(fixTime).toBe(releaseDiff)\n\n    // console.log(fixTime/(1000*60*60*24))\n  })\n\n  it('get mttr for bug 1 when no release after bug 2', () => {\n    const bugList: Issue[] = [\n      {\n        created_at: '2023-04-22T21:44:06Z',\n        closed_at: '2023-04-23T16:47:40Z',\n        labels: [{name: 'bug'}],\n        repository_url: 'some-path/repository'\n      },\n      {\n        created_at: '2023-04-25T21:21:49Z',\n        closed_at: '2023-04-29T12:54:45Z',\n        labels: [{name: 'bug'}],\n        repository_url: 'some-path/repository'\n      }\n    ] as Issue[]\n    const localReleases = [\n      {\n        published_at: '2023-04-25T00:00:00Z',\n        url: 'path/with/repository/in/it'\n      },\n      {\n        published_at: '2023-04-24T00:00:00Z',\n        url: 'path/with/repository/in/it'\n      },\n      {\n        published_at: '2023-04-20T00:00:00Z',\n        url: 'path/with/repository/in/it'\n      }\n    ] as Release[]\n\n    // console.log(fixTime/(1000*60*60*24))\n    const mttrEmpty = new MeanTimeToRestore(\n      bugList,\n      localReleases,\n      new Date('2023-04-29T12:54:45Z')\n    )\n    const meanTime = mttrEmpty.mttr()\n\n    expect(meanTime).toBe(4)\n  })\n\n  it('throw error when empty release list', () => {\n    const m = (): void => {\n      new MeanTimeToRestore([] as Issue[], [] as Release[])\n    }\n    expect(m).toThrow('Empty release list')\n  })\n\n  it('get mttr for bug 1 when release in wrong repo after bug 2', () => {\n    const bugList: Issue[] = [\n      {\n        created_at: '2023-04-22T21:44:06Z',\n        closed_at: '2023-04-23T16:47:40Z',\n        labels: [{name: 'bug'}],\n        repository_url: 'some-path/repository'\n      },\n      {\n        created_at: '2023-04-25T21:21:49Z',\n        closed_at: '2023-04-29T12:54:45Z',\n        labels: [{name: 'bug'}],\n        repository_url: 'some-path/repository'\n      }\n    ] as Issue[]\n    const localReleases = [\n      {\n        published_at: '2023-04-25T00:00:00Z',\n        url: 'path/with/repository/in/it'\n      },\n      {\n        published_at: '2023-04-24T00:00:00Z',\n        url: 'path/with/repository/in/it'\n      },\n      {\n        published_at: '2023-04-30T00:00:00Z',\n        url: 'path/with/other-repo/in/it'\n      },\n      {\n        published_at: '2023-04-20T00:00:00Z',\n        url: 'path/with/repository/in/it'\n      }\n    ] as Release[]\n\n    const mttrEmpty = new MeanTimeToRestore(\n      bugList,\n      localReleases,\n      new Date('2023-04-30T00:00:00Z')\n    )\n    const meanTime = mttrEmpty.mttr()\n\n    expect(meanTime).toBe(4)\n  })\n\n  it('get mttr for 2 bugs when release after bug 2', () => {\n    const bugList: Issue[] = [\n      {\n        created_at: '2023-04-22T21:44:06Z',\n        closed_at: '2023-04-23T16:47:40Z',\n        labels: [{name: 'bug'}],\n        repository_url: 'some-path/repository'\n      },\n      {\n        created_at: '2023-04-25T21:21:49Z',\n        closed_at: '2023-04-29T12:54:45Z',\n        labels: [{name: 'bug'}],\n        repository_url: 'some-path/repository'\n      }\n    ] as Issue[]\n    const localReleases = [\n      {\n        published_at: '2023-04-30T00:00:00Z',\n        url: 'path/with/repository/in/it'\n      },\n      {\n        published_at: '2023-04-24T00:00:00Z',\n        url: 'path/with/repository/in/it'\n      },\n      {\n        published_at: '2023-04-20T00:00:00Z',\n        url: 'path/with/repository/in/it'\n      }\n    ] as Release[]\n\n    // console.log(fixTime/(1000*60*60*24))\n    const mttrEmpty = new MeanTimeToRestore(\n      bugList,\n      localReleases,\n      new Date('2023-04-30T00:00:00Z')\n    )\n    const meanTime = mttrEmpty.mttr()\n\n    expect(meanTime).toBe(5)\n  })\n\n  it('get mttr for 2 bugs on two repos when release after bug 2', () => {\n    const bugList: Issue[] = [\n      {\n        // 21 -> 24 = 3\n        created_at: '2023-04-22T21:44:06Z',\n        closed_at: '2023-04-23T16:47:40Z',\n        labels: [{name: 'bug'}],\n        repository_url: 'some-path/other-repo'\n      },\n      {\n        // 24 -> 30 = 6\n        created_at: '2023-04-25T21:21:49Z',\n        closed_at: '2023-04-29T12:54:45Z',\n        labels: [{name: 'bug'}],\n        repository_url: 'some-path/repository'\n      }\n    ] as Issue[]\n    const localReleases = [\n      {\n        published_at: '2023-04-30T00:00:00Z',\n        url: 'path/with/repository/in/it'\n      },\n      {\n        published_at: '2023-04-24T00:00:00Z',\n        url: 'path/with/repository/in/it'\n      },\n      {\n        published_at: '2023-04-20T00:00:00Z',\n        url: 'path/with/repository/in/it'\n      },\n      {\n        published_at: '2023-04-21T00:00:00Z',\n        url: 'path/with/other-repo/in/it'\n      },\n      {\n        published_at: '2023-04-24T00:00:00Z',\n        url: 'path/with/other-repo/in/it'\n      }\n    ] as Release[]\n\n    const mttrEmpty = new MeanTimeToRestore(\n      bugList,\n      localReleases,\n      new Date('2023-04-30T00:00:00Z')\n    )\n    const meanTime = mttrEmpty.mttr()\n\n    expect(meanTime).toBe(4.5)\n  })\n\n  it('get mttr for 2 bugs on two repos when no release after bug 1', () => {\n    const bugList: Issue[] = [\n      {\n        // 21 -> 24 = 3\n        created_at: '2023-04-22T21:44:06Z',\n        closed_at: '2023-04-23T16:47:40Z',\n        labels: [{name: 'bug'}],\n        repository_url: 'some-path/other-repo'\n      },\n      {\n        // 24 -> 30 = 6\n        created_at: '2023-04-25T21:21:49Z',\n        closed_at: '2023-04-29T12:54:45Z',\n        labels: [{name: 'bug'}],\n        repository_url: 'some-path/repository'\n      }\n    ] as Issue[]\n    const localReleases = [\n      {\n        published_at: '2023-04-30T00:00:00Z',\n        url: 'path/with/repository/in/it'\n      },\n      {\n        published_at: '2023-04-24T00:00:00Z',\n        url: 'path/with/repository/in/it'\n      },\n      {\n        published_at: '2023-04-20T00:00:00Z',\n        url: 'path/with/repository/in/it'\n      },\n      {\n        published_at: '2023-04-21T00:00:00Z',\n        url: 'path/with/other-repo/in/it'\n      }\n    ] as Release[]\n\n    const mttrEmpty = new MeanTimeToRestore(\n      bugList,\n      localReleases,\n      new Date('2023-04-30T00:00:00Z')\n    )\n    const meanTime = mttrEmpty.mttr()\n\n    expect(meanTime).toBe(6)\n  })\n  it('get average time to repair', () => {\n    const avMttr: number = mttr.mttr()\n\n    expect(avMttr).toBeGreaterThan(6.4)\n    expect(avMttr).toBeLessThan(7.9)\n  })\n\n  it('throw excepiton when no releases', () => {\n    const emptyReleaseList: Release[] = []\n\n    const t = (): void => {\n      new MeanTimeToRestore(issues, emptyReleaseList)\n    }\n\n    expect(t).toThrow('Empty release list')\n  })\n\n  it('return 0 when no bugs', () => {\n    const emptyBugList: Issue[] = []\n\n    const mttrEmpty = new MeanTimeToRestore(emptyBugList, releases)\n    const meanTime = mttrEmpty.mttr()\n\n    expect(meanTime).toBe(0)\n  })\n})\n"},"__tests__/action.test.ts":{"tests":[{"id":"51","name":"run should use the provided token input"},{"id":"52","name":"run should fall back to GH_TOKEN environment variable if token input is empty"},{"id":"53","name":"run should handle a null token input and fall back to GH_TOKEN environment variable"},{"id":"54","name":"run should use default repo and owner when inputs are not provided"},{"id":"55","name":"run should handle multiple repositories correctly"},{"id":"56","name":"run should set correct outputs for deploy-rate, lead-time, and logs"},{"id":"57","name":"run should handle empty issue list case"},{"id":"58","name":"run should handle errors and set failure"},{"id":"59","name":"run should set filtered to true when 'filtered' input is 'true'"},{"id":"60","name":"run should set filtered to false when 'filtered' input is 'false'"},{"id":"61","name":"run should set filtered to false when 'filtered' input is anything other than 'true'"}],"source":"import * as core from '@actions/core'\nimport * as github from '@actions/github'\nimport {ReleaseAdapter} from '../src/ReleaseAdapter'\nimport {DeployFrequency} from '../src/DeployFrequency'\nimport {ChangeFailureRate} from '../src/ChangeFailureRate'\nimport {IssuesAdapter} from '../src/IssuesAdapter'\nimport {MeanTimeToRestore} from '../src/MeanTimeToRestore'\nimport {PullRequestsAdapter} from '../src/PullRequestsAdapter'\nimport {LeadTime} from '../src/LeadTime'\nimport {run} from '../src/index'\nimport type {Release} from '../src/types/Release'\nimport type {PullRequest} from '../src/types/PullRequest'\nimport type {Issue} from '../src/types/Issue'\n\nvi.mock('@actions/core')\nvi.mock('@actions/github')\nvi.mock('../src/ReleaseAdapter')\nvi.mock('../src/DeployFrequency')\nvi.mock('../src/ChangeFailureRate')\nvi.mock('../src/IssuesAdapter')\nvi.mock('../src/MeanTimeToRestore')\nvi.mock('../src/PullRequestsAdapter')\nvi.mock('../src/CommitsAdapter')\nvi.mock('../src/LeadTime')\n\n// Mocking github.context.repo as read-only\nconst mockRepo = {owner: 'defaultOwner', repo: 'defaultRepo'}\nObject.defineProperty(github.context, 'repo', {\n  get: () => mockRepo\n})\n\ndescribe('run', () => {\n  beforeEach(() => {\n    vi.clearAllMocks()\n  })\n\n  it('should use the provided token input', async () => {\n    const mockToken = 'provided-token'\n\n    vi.spyOn(core, 'getInput').mockImplementation((name: string) => {\n      if (name === 'token') {\n        return mockToken\n      }\n      return ''\n    })\n\n    const token = process.env.GH_TOKEN\n    process.env.GH_TOKEN = undefined // Temporarily remove GH_TOKEN for this test = undefined // Temporarily remove GH_TOKEN for this test\n\n    await run()\n\n    expect(core.getInput).toHaveBeenCalledWith('token')\n    expect(process.env.GH_TOKEN).toBe('undefined') // Ensure the environment variable is not used\n    process.env.GH_TOKEN = token // Restore GH_TOKEN for other tests\n  })\n\n  it('should fall back to GH_TOKEN environment variable if token input is empty', async () => {\n    const mockEnvToken = 'env-token'\n\n    vi.spyOn(core, 'getInput').mockImplementation((name: string) => {\n      if (name === 'token') {\n        return ''\n      }\n      return ''\n    })\n\n    process.env.GH_TOKEN = mockEnvToken\n\n    await run()\n\n    expect(core.getInput).toHaveBeenCalledWith('token')\n    expect(process.env.GH_TOKEN).toBe(mockEnvToken)\n  })\n\n  it('should handle a null token input and fall back to GH_TOKEN environment variable', async () => {\n    const mockEnvToken = 'env-token'\n\n    vi.spyOn(core, 'getInput').mockImplementation((name: string) => {\n      if (name === 'token') {\n        return null as unknown as string // Simulate null input\n      }\n      return ''\n    })\n\n    process.env.GH_TOKEN = mockEnvToken\n\n    await run()\n\n    expect(core.getInput).toHaveBeenCalledWith('token')\n    expect(process.env.GH_TOKEN).toBe(mockEnvToken)\n  })\n  it('should use default repo and owner when inputs are not provided', async () => {\n    vi.spyOn(core, 'getInput').mockImplementation((name: string) => {\n      switch (name) {\n        case 'repo':\n          return ''\n        case 'owner':\n          return ''\n        case 'token':\n          return 'mock-token'\n        case 'logging':\n          return 'false'\n        case 'filtered':\n          return 'false'\n        default:\n          return ''\n      }\n    })\n\n    const coreInfoSpy = vi.spyOn(core, 'info')\n\n    await run()\n\n    expect(coreInfoSpy).toHaveBeenCalledWith('defaultRepo - default repo.')\n    expect(coreInfoSpy).toHaveBeenCalledWith('defaultOwner - default owner.')\n  })\n\n  it('should handle multiple repositories correctly', async () => {\n    vi.spyOn(core, 'getInput').mockImplementation((name: string) => {\n      switch (name) {\n        case 'repo':\n          return 'repo1,repo2'\n        case 'owner':\n          return 'testOwner'\n        case 'token':\n          return 'mock-token'\n        default:\n          return ''\n      }\n    })\n\n    const coreInfoSpy = vi.spyOn(core, 'info')\n\n    await run()\n\n    expect(coreInfoSpy).toHaveBeenCalledWith('testOwner/repo1')\n    expect(coreInfoSpy).toHaveBeenCalledWith('testOwner/repo2')\n    expect(coreInfoSpy).toHaveBeenCalledWith('2 repositories registered.')\n  })\n\n  it('should set correct outputs for deploy-rate, lead-time, and logs', async () => {\n    vi.spyOn(core, 'getInput').mockImplementation((name: string) => {\n      switch (name) {\n        case 'repo':\n          return 'repo1'\n        case 'owner':\n          return 'testOwner'\n        case 'token':\n          return 'mock-token'\n        case 'logging':\n          return 'true'\n        case 'filtered':\n          return 'false'\n        default:\n          return ''\n      }\n    })\n\n    const mockReleases = [{}, {}] as Release[] // Mock release objects\n    const mockPRs = [{}, {}] as PullRequest[] // Mock pull request objects\n    const mockIssues = [{}, {}] as Issue[] // Mock issue objects\n    ;(\n      ReleaseAdapter.prototype.GetAllReleasesLastMonth as Mock\n    ).mockResolvedValue(mockReleases)\n    ;(\n      PullRequestsAdapter.prototype.GetAllPRsLastMonth as Mock\n    ).mockResolvedValue(mockPRs)\n    ;(IssuesAdapter.prototype.GetAllIssuesLastMonth as Mock).mockResolvedValue(\n      mockIssues\n    )\n    ;(DeployFrequency.prototype.rate as Mock).mockReturnValue(5)\n    ;(DeployFrequency.prototype.getLog as Mock).mockReturnValue([\n      'log1',\n      'log2'\n    ])\n    ;(LeadTime.prototype.getLeadTime as Mock).mockResolvedValue(10)\n    ;(LeadTime.prototype.getLog as Mock).mockReturnValue([\n      'leadTimeLog1',\n      'leadTimeLog2'\n    ])\n    ;(ChangeFailureRate.prototype.Cfr as Mock).mockReturnValue(0.1)\n    ;(MeanTimeToRestore.prototype.mttr as Mock).mockReturnValue(3)\n\n    const coreSetOutputSpy = vi.spyOn(core, 'setOutput')\n\n    await run()\n\n    expect(coreSetOutputSpy).toHaveBeenCalledWith('deploy-rate', 5)\n    expect(coreSetOutputSpy).toHaveBeenCalledWith(\n      'deploy-rate-log',\n      'log1\\nlog2'\n    )\n    expect(coreSetOutputSpy).toHaveBeenCalledWith('lead-time', 10)\n    expect(coreSetOutputSpy).toHaveBeenCalledWith(\n      'lead-time-log',\n      'leadTimeLog1\\nleadTimeLog2'\n    )\n    expect(coreSetOutputSpy).toHaveBeenCalledWith('change-failure-rate', 0.1)\n    expect(coreSetOutputSpy).toHaveBeenCalledWith('mttr', 3)\n  })\n\n  it('should handle empty issue list case', async () => {\n    vi.spyOn(core, 'getInput').mockImplementation((name: string) => {\n      switch (name) {\n        case 'repo':\n          return 'repo1'\n        case 'owner':\n          return 'testOwner'\n        case 'token':\n          return 'mock-token'\n        default:\n          return ''\n      }\n    })\n    ;(IssuesAdapter.prototype.GetAllIssuesLastMonth as Mock).mockResolvedValue(\n      undefined\n    )\n\n    const coreSetOutputSpy = vi.spyOn(core, 'setOutput')\n\n    await run()\n\n    expect(coreSetOutputSpy).toHaveBeenCalledWith(\n      'change-failure-rate',\n      'empty issue list'\n    )\n    expect(coreSetOutputSpy).toHaveBeenCalledWith('mttr', 'empty issue list')\n  })\n\n  it('should handle errors and set failure', async () => {\n    vi.spyOn(core, 'getInput').mockReturnValue('repo1')\n    const coreSetFailedSpy = vi.spyOn(core, 'setFailed')\n    ;(\n      ReleaseAdapter.prototype.GetAllReleasesLastMonth as Mock\n    ).mockRejectedValue(new Error('Failed to fetch releases'))\n\n    await run()\n\n    expect(coreSetFailedSpy).toHaveBeenCalledWith('Failed to fetch releases')\n  })\n  it(\"should set filtered to true when 'filtered' input is 'true'\", async () => {\n    vi.spyOn(core, 'getInput').mockImplementation((name: string) => {\n      if (name === 'filtered') {\n        return 'true'\n      }\n      return ''\n    })\n\n    await run()\n\n    expect(core.getInput).toHaveBeenCalledWith('filtered')\n    // You would test the value of filtered indirectly via your logic (mocking, checking calls, etc.)\n  })\n\n  it(\"should set filtered to false when 'filtered' input is 'false'\", async () => {\n    vi.spyOn(core, 'getInput').mockImplementation((name: string) => {\n      if (name === 'filtered') {\n        return 'false'\n      }\n      return ''\n    })\n\n    await run()\n\n    expect(core.getInput).toHaveBeenCalledWith('filtered')\n    // You would test the value of filtered indirectly via your logic (mocking, checking calls, etc.)\n  })\n\n  it(\"should set filtered to false when 'filtered' input is anything other than 'true'\", async () => {\n    vi.spyOn(core, 'getInput').mockImplementation((name: string) => {\n      if (name === 'filtered') {\n        return 'someOtherValue'\n      }\n      return ''\n    })\n\n    await run()\n\n    expect(core.getInput).toHaveBeenCalledWith('filtered')\n    // You would test the value of filtered indirectly via your logic (mocking, checking calls, etc.)\n  })\n})\n"},"__tests__/CommitsAdapter.spec.ts":{"tests":[{"id":"62","name":"CommitsAdapter should initialize with the correct token"},{"id":"63","name":"CommitsAdapter should initialize with an undefined token"},{"id":"64","name":"CommitsAdapter should fetch commits with the correct headers"},{"id":"65","name":"CommitsAdapter should handle missing or incorrect headers"},{"id":"66","name":"CommitsAdapter should handle errors during API call"},{"id":"67","name":"CommitsAdapter should handle empty or invalid URL"},{"id":"68","name":"CommitsAdapter should handle undefined token gracefully"},{"id":"69","name":"CommitsAdapter should handle empty API response"}],"source":"import {CommitsAdapter} from '../src/CommitsAdapter'\nimport {Octokit} from '@octokit/core'\nimport * as core from '@actions/core'\nimport type {Commit} from '../src/types/Commit'\n\nvi.mock('@octokit/core')\nvi.mock('@actions/core')\n\ndescribe('CommitsAdapter', () => {\n  const token = 'test-token'\n  let adapter: CommitsAdapter\n  let mockRequest: Mock\n\n  beforeEach(() => {\n    mockRequest = vi.fn()\n    ;(Octokit as unknown as Mock).mockImplementation(function () {\n      return {request: mockRequest}\n    })\n    adapter = new CommitsAdapter(token)\n  })\n\n  afterEach(() => {\n    vi.clearAllMocks()\n  })\n\n  it('should initialize with the correct token', () => {\n    expect(Octokit).toHaveBeenCalledWith({\n      auth: token\n    })\n  })\n\n  it('should initialize with an undefined token', () => {\n    new CommitsAdapter(undefined)\n    expect(Octokit).toHaveBeenCalledWith({\n      auth: undefined\n    })\n  })\n\n  it('should fetch commits with the correct headers', async () => {\n    const url = 'https://api.github.com/repos/owner/repo/commits'\n    const mockCommits: Commit[] = [\n      {\n        /* mock commit data */\n      }\n    ]\n    mockRequest.mockResolvedValue({data: mockCommits})\n\n    const commits = await adapter.getCommitsFromUrl(url)\n\n    expect(mockRequest).toHaveBeenCalledWith(url, {\n      headers: {'X-GitHub-Api-Version': '2022-11-28'}\n    })\n    expect(commits).toEqual(mockCommits)\n  })\n\n  it('should handle missing or incorrect headers', async () => {\n    const url = 'https://api.github.com/repos/owner/repo/commits'\n    mockRequest.mockImplementation((_url, options) => {\n      if (\n        !options.headers ||\n        options.headers['X-GitHub-Api-Version'] !== '2022-11-28'\n      ) {\n        throw new Error('Incorrect headers')\n      }\n      return {\n        data: [\n          {\n            /* mock commit data */\n          }\n        ]\n      }\n    })\n\n    // Test with missing headers\n    await expect(adapter.getCommitsFromUrl(url)).resolves.toBeDefined()\n\n    // Test with incorrect headers - error is caught and setFailed is called\n    mockRequest.mockClear()\n    mockRequest.mockImplementation(() => {\n      throw new Error('Incorrect headers')\n    })\n    const result = await adapter.getCommitsFromUrl(url)\n    expect(result).toBeUndefined()\n    expect(core.setFailed).toHaveBeenCalledWith('Incorrect headers')\n  })\n\n  it('should handle errors during API call', async () => {\n    const url = 'https://api.github.com/repos/owner/repo/commits'\n    const errorMessage = 'API call failed'\n    mockRequest.mockRejectedValue(new Error(errorMessage))\n\n    const commits = await adapter.getCommitsFromUrl(url)\n\n    expect(core.setFailed).toHaveBeenCalledWith(errorMessage)\n    expect(commits).toBeUndefined()\n  })\n\n  it('should handle empty or invalid URL', async () => {\n    const url = ''\n    mockRequest.mockRejectedValue(new Error('Invalid URL'))\n    const commits = await adapter.getCommitsFromUrl(url)\n\n    expect(mockRequest).toHaveBeenCalled()\n    expect(core.setFailed).toHaveBeenCalledWith('Invalid URL')\n    expect(commits).toBeUndefined()\n  })\n\n  it('should handle undefined token gracefully', () => {\n    const adapterWithoutToken = new CommitsAdapter(undefined)\n    expect(adapterWithoutToken.token).toBeUndefined()\n    expect(adapterWithoutToken.octokit).toBeDefined() // Octokit should still be initialized\n  })\n\n  it('should handle empty API response', async () => {\n    const url = 'https://api.github.com/repos/owner/repo/commits'\n    mockRequest.mockResolvedValue({data: []})\n\n    const commits = await adapter.getCommitsFromUrl(url)\n\n    expect(commits).toEqual([])\n  })\n})\n"},"__tests__/DeployFrequency.test.ts":{"tests":[{"id":"70","name":"Deploy frequency should calculate releases pr week for release less than 1 week"},{"id":"71","name":"Deploy frequency should calculate releases pr week for release more than 1 week ago"},{"id":"72","name":"Deploy frequency should calculate releases pr week for release this week based on large list"},{"id":"73","name":"Deploy frequency should monthly calculate releases pr week for release more than 1 week ago"},{"id":"74","name":"Deploy frequency should calculate release rate last month"},{"id":"75","name":"Deploy frequency should calculate release rate last month based on 7 releases list"},{"id":"76","name":"Deploy frequency should calculate release rate next month"},{"id":"77","name":"Deploy frequency should throw exception when no releases"},{"id":"78","name":"Deploy frequency should throw exception when release list is null"},{"id":"79","name":"Deploy frequency should get an empty log of releases"},{"id":"80","name":"Deploy frequency should get release log list weekly when rate calculated"},{"id":"81","name":"Deploy frequency should get release log list monthly when rate calculated"},{"id":"82","name":"Deploy frequency should get release log list when rate calculated"}],"source":"//\nimport {DeployFrequency} from '../src/DeployFrequency'\nimport fs from 'fs'\nimport {Release} from '../src/types/Release'\n\ndescribe('Deploy frequency should', () => {\n  // Release v0.0.1:2023-04-14, v0.0.2:2023-04-22\n  const releaseList2: Release[] = JSON.parse(\n    fs.readFileSync('./__tests__/test-data/one-release.json', 'utf-8')\n  )\n  // Release\n  // v0.0.1:2023-04-12, v0.0.2:2023-04-22, v0.1.0:2023-04-29,\n  // v0.2.0:2023-04-30, v0.2.1:2023-04-30, v0.3.0-beta:2023-04-30,\n  // v0.3.1-beta:2023-04-30\n  const releaseList7: Release[] = JSON.parse(\n    fs.readFileSync('./__tests__/test-data/releases.json', 'utf-8')\n  )\n  it('calculate releases pr week for release less than 1 week', () => {\n    const df = new DeployFrequency(releaseList2, '2023-04-14T22:33:11Z')\n    const wr = df.weekly()\n\n    expect(wr).toBe(1)\n  })\n  it('calculate releases pr week for release more than 1 week ago', () => {\n    const df = new DeployFrequency(releaseList2, '2023-04-24T22:33:11Z')\n    const wr = df.weekly()\n\n    expect(wr).toBe(1)\n  })\n  it('calculate releases pr week for release this week based on large list', () => {\n    const df = new DeployFrequency(releaseList7, '2023-05-01T22:33:11Z')\n    const wr = df.weekly()\n\n    expect(wr).toBe(5)\n  })\n  it('monthly calculate releases pr week for release more than 1 week ago', () => {\n    const df = new DeployFrequency(releaseList2, '2023-04-24T22:33:11Z')\n    const mr = df.monthly()\n\n    expect(mr).toBe(2)\n  })\n  it('calculate release rate last month', () => {\n    const df = new DeployFrequency(releaseList2, '2023-04-14T22:33:11Z')\n    const rr = df.rate()\n\n    expect(rr).toBe('0.47')\n  })\n  it('calculate release rate last month based on 7 releases list', () => {\n    const df = new DeployFrequency(releaseList7, '2023-05-14T22:33:11Z')\n    const rr = df.rate()\n\n    expect(rr).toBe('1.40')\n  })\n  it('calculate release rate next month', () => {\n    const df = new DeployFrequency(releaseList2, '2023-05-23T22:33:11Z')\n    const rr = df.rate()\n\n    expect(rr).toBe('0.00')\n  })\n  it('throw exception when no releases', () => {\n    const emptyReleaseList: Release[] = []\n\n    const t = (): void => {\n      new DeployFrequency(emptyReleaseList)\n    }\n\n    expect(t).toThrow('Empty release list')\n  })\n  it('throw exception when release list is null', () => {\n    const emptyReleaseList: Release[] | null = null\n\n    const t = (): void => {\n      new DeployFrequency(emptyReleaseList)\n    }\n\n    expect(t).toThrow('Empty release list')\n  })\n  it('get an empty log of releases', () => {\n    const df = new DeployFrequency(releaseList7, '2023-05-14T22:33:11Z')\n\n    expect(df.getLog().length).toBe(0)\n  })\n\n  it('get release log list weekly when rate calculated', () => {\n    const df = new DeployFrequency(releaseList7, '2023-05-01T22:33:11Z')\n\n    df.weekly()\n\n    expect(\n      df.getLog().map(l => {\n        return l.includes('release')\n      }).length\n    ).toBe(5)\n  })\n\n  it('get release log list monthly when rate calculated', () => {\n    const df = new DeployFrequency(releaseList7, '2023-05-14T22:33:11Z')\n\n    df.monthly()\n\n    expect(\n      df.getLog().map(l => {\n        return l.includes('release')\n      }).length\n    ).toBe(6)\n  })\n\n  it('get release log list when rate calculated', () => {\n    const df = new DeployFrequency(releaseList7, '2023-05-14T22:33:11Z')\n\n    df.rate()\n\n    expect(\n      df.getLog().map(l => {\n        return l.includes('release')\n      }).length\n    ).toBe(6)\n  })\n})\n"},"__tests__/ReleaseAdapter.test.ts":{"tests":[{"id":"83","name":"Release Adapter should ice breaker"},{"id":"84","name":"Release Adapter should return paged values"},{"id":"85","name":"Release Adapter should handles access denied"}],"source":"import {http, HttpResponse} from 'msw'\nimport {setupServer} from 'msw/node'\nimport {setFailed} from '@actions/core'\nimport {ReleaseAdapter} from '../src/ReleaseAdapter'\nimport type {Release} from '../src/types/Release'\nimport type {Person} from '../src/types/Person'\n\nconst server = setupServer(\n  http.get(\n    'https://api.github.com/repos/:owner/:rep/releases',\n    // eslint-disable-next-line @typescript-eslint/no-unused-vars\n    ({request, params, cookies}) => {\n      const url = new URL(request.url)\n      const page = url.searchParams.getAll('page')\n      const releases: Release[] = []\n      const author: Person = {\n        login: '',\n        id: 0,\n        node_id: '',\n        gravatar_id: '',\n        url: '',\n        html_url: '',\n        followers_url: '',\n        following_url: '',\n        gists_url: '',\n        starred_url: '',\n        subscriptions_url: '',\n        organizations_url: '',\n        repos_url: '',\n        events_url: '',\n        received_events_url: '',\n        type: '',\n        site_admin: false\n      }\n      for (let i = 0; i <"+" (+page <"+" 2 ? 100 : 50); i++) {\n        releases.push({\n          id: i,\n          url: '',\n          uploadUrl: '',\n          author,\n          node_id: '',\n          tag_name: '',\n          target_commitish: '',\n          name: '',\n          draft: false,\n          prerelease: false,\n          created_at: '',\n          published_at: '',\n          assets: [],\n          tarball_url: '',\n          zipball_url: '',\n          body: ''\n        })\n      }\n      return HttpResponse.json(releases)\n    }\n  )\n)\nvi.mock('@actions/core', () => ({\n  setFailed: vi.fn()\n}))\n\ndescribe('Release Adapter should', () => {\n  beforeEach(() => {\n    server.listen()\n    vi.clearAllMocks()\n  })\n\n  afterAll(() => server.close())\n\n  it('ice breaker', () => {\n    expect(true).toBe(true)\n  })\n\n  it('return paged values', async () => {\n    const r = new ReleaseAdapter(undefined, 'test-owner', ['project1'])\n\n    const releases: Release[] = (await r.GetAllReleasesLastMonth()) as Release[]\n\n    expect(releases.length).toBe(150)\n  })\n\n  it('handles access denied', async () => {\n    server.close()\n    const errorServer = setupServer(\n      http.get(\n        'https://api.github.com/repos/:owner/:rep/releases',\n        // eslint-disable-next-line @typescript-eslint/no-unused-vars\n        ({request, params, cookies}) => {\n          return new HttpResponse('access denied', {status: 401})\n        }\n      )\n    )\n    errorServer.listen()\n    const r = new ReleaseAdapter(undefined, 'test-owner', ['project1'])\n    const result = await r.GetAllReleasesLastMonth()\n\n    expect(result).toBe(undefined)\n    expect(setFailed).toHaveBeenCalledWith('access denied')\n    errorServer.close()\n  })\n})\n"},"__tests__/PullRequestsAdapter.test.ts":{"tests":[{"id":"86","name":"PullRequest Adapter should ice breaker"},{"id":"87","name":"PullRequest Adapter should return paged values"},{"id":"88","name":"PullRequest Adapter should handles access denied"}],"source":"import {http, HttpResponse} from 'msw'\nimport {setupServer} from 'msw/node'\nimport {setFailed} from '@actions/core'\nimport {PullRequestsAdapter} from '../src/PullRequestsAdapter'\nimport type {PullRequest} from '../src/types/PullRequest'\n\nconst server = setupServer(\n  http.get(\n    'https://api.github.com/repos/:owner/:rep/pulls',\n    // eslint-disable-next-line @typescript-eslint/no-unused-vars\n    ({request, params, cookies}) => {\n      const url = new URL(request.url)\n      const page = url.searchParams.getAll('page')\n      const pullRequests: PullRequest[] = []\n      for (let i = 0; i <"+" (+page <"+" 2 ? 100 : 50); i++) {\n        pullRequests.push({id: i} as PullRequest)\n      }\n      return HttpResponse.json(pullRequests)\n    }\n  )\n)\nvi.mock('@actions/core', () => ({\n  setFailed: vi.fn()\n}))\n\ndescribe('PullRequest Adapter should', () => {\n  beforeEach(() => {\n    server.listen()\n    vi.clearAllMocks()\n  })\n\n  afterAll(() => server.close())\n\n  it('ice breaker', () => {\n    expect(true).toBe(true)\n  })\n\n  it('return paged values', async () => {\n    const r = new PullRequestsAdapter(undefined, 'test-owner', ['project1'])\n\n    const pullRequests: PullRequest[] =\n      (await r.GetAllPRsLastMonth()) as PullRequest[]\n\n    expect(pullRequests.length).toBe(150)\n  })\n\n  it('handles access denied', async () => {\n    server.close()\n    const errorServer = setupServer(\n      http.get(\n        'https://api.github.com/repos/:owner/:rep/pulls',\n        // eslint-disable-next-line @typescript-eslint/no-unused-vars\n        ({request, params, cookies}) => {\n          return new HttpResponse('access denied', {status: 401})\n        }\n      )\n    )\n    errorServer.listen()\n    const r = new PullRequestsAdapter(undefined, 'test-owner', ['project1'])\n    const result = await r.GetAllPRsLastMonth()\n    expect(result).toBe(undefined)\n    expect(setFailed).toHaveBeenCalledWith('access denied')\n    errorServer.close()\n  })\n})\n"},"__tests__/IssuesAdapter.test.ts":{"tests":[{"id":"89","name":"Issue Adapter should ice breaker"},{"id":"90","name":"Issue Adapter should return paged values"},{"id":"91","name":"Issue Adapter should handles access denied"}],"source":"import {http, HttpResponse} from 'msw'\nimport {setupServer} from 'msw/node'\nimport {setFailed} from '@actions/core'\nimport {IssuesAdapter} from '../src/IssuesAdapter'\nimport {Issue} from '../src/types/Issue'\n\nconst server = setupServer(\n  http.get(\n    'https://api.github.com/repos/:owner/:rep/issues',\n    // eslint-disable-next-line @typescript-eslint/no-unused-vars\n    ({request, params, cookies}) => {\n      const url = new URL(request.url)\n      const page = url.searchParams.getAll('page')\n      const issues: Issue[] = []\n      for (let i = 0; i <"+" (+page <"+" 2 ? 100 : 50); i++) {\n        issues.push({id: i} as Issue)\n      }\n      return HttpResponse.json(issues)\n    }\n  )\n)\nvi.mock('@actions/core', () => ({\n  setFailed: vi.fn()\n}))\n\ndescribe('Issue Adapter should', () => {\n  beforeEach(() => {\n    server.listen()\n    vi.clearAllMocks()\n  })\n\n  afterAll(() => server.close())\n\n  it('ice breaker', () => {\n    expect(true).toBe(true)\n  })\n\n  it('return paged values', async () => {\n    const r = new IssuesAdapter(undefined, 'test-owner', ['project1'])\n\n    const issues: Issue[] = (await r.GetAllIssuesLastMonth()) as Issue[]\n\n    expect(issues.length).toBe(150)\n  })\n\n  it('handles access denied', async () => {\n    server.close()\n    const errorServer = setupServer(\n      http.get(\n        'https://api.github.com/repos/:owner/:rep/issues',\n        // eslint-disable-next-line @typescript-eslint/no-unused-vars\n        ({request, params, cookies}) => {\n          return new HttpResponse('access denied', {status: 401})\n        }\n      )\n    )\n    errorServer.listen()\n    const r = new IssuesAdapter(undefined, 'test-owner', ['project1'])\n    const result = await r.GetAllIssuesLastMonth()\n    expect(result).toBe(undefined)\n    expect(setFailed).toHaveBeenCalledWith('access denied')\n    errorServer.close()\n  })\n})\n"},"__tests__/CommitsAdapter.test.ts":{"tests":[{"id":"92","name":"Commit Adapter should ice breaker"},{"id":"93","name":"Commit Adapter should return unpaged values"},{"id":"94","name":"Commit Adapter should handles access denied"}],"source":"import {http, HttpResponse} from 'msw'\nimport {setupServer} from 'msw/node'\nimport {setFailed} from '@actions/core'\nimport {CommitsAdapter} from '../src/CommitsAdapter'\nimport fs from 'fs'\nimport {Commit} from '../src/types/Commit'\n\nconst commitsUrl =\n  'https://api.github.com/repos/stenjo/devops-metrics-action/pulls/69/commits'\nconst server = setupServer(\n  http.get(\n    commitsUrl,\n    // eslint-disable-next-line @typescript-eslint/no-unused-vars\n    ({request, params, cookies}) => {\n      const commits: Commit[] = JSON.parse(\n        fs.readFileSync('./__tests__/test-data/commits.json').toString()\n      ) as Commit[]\n      return HttpResponse.json(commits)\n    }\n  )\n)\nvi.mock('@actions/core', () => ({\n  setFailed: vi.fn()\n}))\n\ndescribe('Commit Adapter should', () => {\n  beforeEach(() => {\n    server.listen()\n    vi.clearAllMocks()\n  })\n\n  afterAll(() => server.close())\n\n  it('ice breaker', () => {\n    expect(true).toBe(true)\n  })\n\n  it('return unpaged values', async () => {\n    const r = new CommitsAdapter(undefined)\n\n    const releases: Commit[] = (await r.getCommitsFromUrl(\n      commitsUrl\n    )) as Commit[]\n\n    expect(releases.length).toBe(30)\n  })\n\n  it('handles access denied', async () => {\n    server.close()\n    const errorServer = setupServer(\n      http.get(\n        commitsUrl,\n        // eslint-disable-next-line @typescript-eslint/no-unused-vars\n        ({request, params, cookies}) => {\n          return new HttpResponse('Bad credentials', {status: 401})\n        }\n      )\n    )\n    errorServer.listen()\n    const r = new CommitsAdapter(commitsUrl)\n    const result = await r.getCommitsFromUrl(commitsUrl)\n    expect(result).toBe(undefined)\n    expect(setFailed).toHaveBeenCalledWith('Bad credentials')\n    errorServer.close()\n  })\n})\n"},"__tests__/issues.test.ts":{"tests":[{"id":"95","name":"mocked Issues API should return issues"}],"source":"import fs from 'node:fs'\nimport {IssuesAdapter} from '../src/IssuesAdapter'\nimport type {Issue} from '../src/types/Issue'\nimport * as dotenv from 'dotenv'\n\ndotenv.config()\n\ndescribe.skipIf(!process.env.GH_TOKEN)('Real Issues API should', () => {\n  const issueAdapter = new IssuesAdapter(process.env.GH_TOKEN, 'stenjo', [\n    'dora'\n  ])\n\n  test('fetch issues', async () => {\n    const il = await issueAdapter.GetAllIssuesLastMonth()\n    expect(il?.length).toBeGreaterThan(10)\n  })\n})\n\ndescribe('mocked Issues API should', () => {\n  test('return iss
