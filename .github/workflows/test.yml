name: 'units-test'
on:
  pull_request:
  push:
    branches:
      - main
      - 'releases/*'

permissions:
  contents: write
  pull-requests: write

jobs:
  # unit tests
  units:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - run: npm ci
      - name: Run tests
        run: |
          npx vitest run --coverage 2>&1 | tee ./coverage.txt

      - name: Get branch name
        id: branch-name
        uses: tj-actions/branch-names@v9

      - name: Vitest Coverage Comment
        id: coverageComment
        uses: MishaKav/jest-coverage-comment@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          summary-title: Vitest Coverage (summary)
          title: Test Coverage
          coverage-summary-path: coverage/coverage-summary.json
          coverage-path: ./coverage.txt

      - name: Check the output coverage
        run: |
          echo "Coverage Percentage - ${{ steps.coverageComment.outputs.coverage }}"
          echo "Coverage Color - ${{ steps.coverageComment.outputs.color }}"
          echo "Summary HTML - ${{ steps.coverageComment.outputs.summaryHtml }}"
          mv coverage/coverage-summary.json .

      - name: Create coverage badge
        if: steps.branch-name.outputs.current_branch == 'main'
        run: |
          COVERAGE=${{ steps.coverageComment.outputs.coverage }}
          COLOR=${{ steps.coverageComment.outputs.color }}
          mkdir -p badges
          curl -s "https://img.shields.io/badge/Test%20Coverage-${COVERAGE}%25-${COLOR}" > badges/coverage.svg

      - name: Commit coverage badge and summary
        if: steps.branch-name.outputs.current_branch == 'main'
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          mkdir -p data
          cp coverage-summary.json data/coverage-summary.json
          git add badges/coverage.svg data/coverage-summary.json
          if ! git diff --staged --quiet; then
            git commit -m "Update coverage badge and summary [skip ci]"
            git push
          fi

      - name: Get main coverage for diff
        if: steps.branch-name.outputs.current_branch != 'main'
        run: |
          curl -sf "https://raw.githubusercontent.com/${{ github.repository }}/main/data/coverage-summary.json" -o main-coverage.json || echo '{"total":{"lines":{"pct":0}}}' > main-coverage.json
          function diff {     diff="$(echo "$2" - "$1" | bc -l | sed -e 's/^\./0./' -e 's/^-\./-0./')" ;    echo "$diff"; }
          current=$(jq .total.lines.pct coverage-summary.json)
          main=$(jq .total.lines.pct main-coverage.json)
          pctLineChange=$(diff "$main" "$current")
          echo '**Code Coverage change**' > coverage.md
          echo 'This PR changes coverage by' "$pctLineChange" '%' >> coverage.md
          echo 'Component coverage will change from ' "$main"'% to ' "$current"'%.' >> coverage.md
          echo "$(<coverage.md)"

      - name: Add PR Comment with coverage diff
        if: steps.branch-name.outputs.current_branch != 'main'
        uses: mshick/add-pr-comment@v2
        with:
          message-path: coverage.md
          update-only: false
          refresh-message-position: true
          allow-repeats: false
          message-id: 'add-pr-diff-comment-${{ github.event.pull_request.number }}'

  # test action works running from the graph
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./
        id: dora
        with:
          owner: stenjo
          repo: '[dora,Middager]'
          token: ${{ secrets.GITHUB_TOKEN }}
          logging: true
          filtered: true

      # Use the output from the `dora` step
      - name: Get the output rate
        run: |
          printf "The deploy rate was %s" ${{ steps.dora.outputs.deploy-rate }}      # Use the output from the `dora` step
          printf "The log was:\n%s" ${{ steps.dora.outputs.deploy-rate-log }}      # Use the output from the `dora` step
          printf "${{ steps.dora.outputs.deploy-rate-log }}" > deploy-rate-log.txt
          echo "The lead time was ${{ steps.dora.outputs.lead-time }}"      # Use the output from the `dora` step

      - uses: actions/upload-artifact@v6
        with:
          name: logs
          path: ./*-log.txt
