name: Stryker mutation tests

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  stryker-js:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: npm install

      - name: Run StrykerJS
        continue-on-error: true
        id: stryker
        run: |
          npm run stryker > out

      - name: Print output
        continue-on-error: true
        run: cat out

      - name: Save stryker JS log
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: stryker.log
          path: stryker.log

      - name: Extract stryker score
        run: |
          REPORT="reports/mutation/mutation.json"
          if [ -f "$REPORT" ]; then
            KILLED=$(jq '[.files[].mutants[] | select(.status == "Killed")] | length' "$REPORT")
            TIMEOUT=$(jq '[.files[].mutants[] | select(.status == "Timeout")] | length' "$REPORT")
            SURVIVED=$(jq '[.files[].mutants[] | select(.status == "Survived")] | length' "$REPORT")
            NOCOV=$(jq '[.files[].mutants[] | select(.status == "NoCoverage")] | length' "$REPORT")
            TOTAL=$((KILLED + TIMEOUT + SURVIVED + NOCOV))
            if [ "$TOTAL" -gt 0 ]; then
              SCORE=$(echo "scale=2; ($KILLED + $TIMEOUT) * 100 / $TOTAL" | bc -l | awk '{split($0,a,"."); print a[1]}')
            else
              SCORE=0
            fi
          else
            echo "::warning::Stryker JSON report not found, falling back to text parsing"
            SCORE=$(grep "All files" out | awk '{print $4}' | awk '{split($0,a,"."); print a[1]}')
            SCORE=${SCORE:-0}
          fi
          echo "stryker-score=$SCORE" >> "$GITHUB_ENV"
          echo "Mutation score: $SCORE%"

      - name: Create the Badge for Stryker Score
        if: github.ref == 'refs/heads/main'
        run: |
          SCORE=${{ env.stryker-score }}
          if [ "$SCORE" -ge 90 ]; then COLOR="brightgreen";
          elif [ "$SCORE" -ge 80 ]; then COLOR="green";
          elif [ "$SCORE" -ge 70 ]; then COLOR="yellowgreen";
          elif [ "$SCORE" -ge 60 ]; then COLOR="yellow";
          elif [ "$SCORE" -ge 50 ]; then COLOR="orange";
          else COLOR="red"; fi
          mkdir -p badges
          curl -s "https://img.shields.io/badge/Stryker%20score-${SCORE}%25-${COLOR}" > badges/stryker.svg

      - name: Commit badge
        if: github.ref == 'refs/heads/main'
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add badges/stryker.svg
          if ! git diff --staged --quiet; then
            git commit -m "Update Stryker score badge [skip ci]"
            git push
          fi

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          retention-days: 1
          path: reports/mutation/
          overwrite: true

      - name: Parse the json output and generate markdown
        continue-on-error: true
        id: extract_from_json
        run: |
          python ./script/generate_md_report.py reports/mutation/mutation.json stryker-report.md https://stenjo.github.io/devops-metrics-action/reports/pr-${{ github.event.pull_request.number }}/mutation-report.html
        shell: /usr/bin/bash -e {0}

      - name: Add formatted table to PR comment
        uses: mshick/add-pr-comment@v2
        with:
          message-path: stryker-report.md
          update-only: false
          refresh-message-position: true
          allow-repeats: false
          message-id: 'add-pr-stryker-comment-${{ github.event.pull_request.number }}'

      - name: Deploy HTML Report to GitHub Pages
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          # Create a new branch for GitHub Pages if it doesn't exist
          git fetch origin gh-pages:gh-pages || git checkout --orphan gh-pages
          git checkout gh-pages

          # Create a directory for this PR and move the report there
          mkdir -p reports/pr-${{env.PR_NUMBER}}
          mv reports/mutation/mutation.html reports/pr-${{env.PR_NUMBER}}/mutation-report.html

          # Commit and push the changes
          git add -f reports/pr-${{env.PR_NUMBER}}/mutation-report.html
          git commit -m "Deploy mutation report for PR #${{env.PR_NUMBER}}"
          git push origin gh-pages

      - name: Output the URL
        run: |
          echo "Report available at: https://stenjo.github.io/devops-metrics-action/reports/pr-${{ github.event.pull_request.number }}/mutation-report.html"
